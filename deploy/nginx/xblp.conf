# nginx reverse-proxy for xboxlive-protect (see DESIGN.md §6.1, §3.2).
# Installed to /etc/nginx/sites-available/xblp, symlinked into sites-enabled.
# Cert is generated by xblp-api at first start; nginx must not start before
# xblp-api.service (enforced by deploy/systemd/nginx.service.d/xblp.conf).

server {
    listen 80;
    server_name xboxlive-protect.local xboxlive-protect;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xboxlive-protect.local xboxlive-protect;

    ssl_certificate     /var/lib/xboxlive-protect/cert.pem;
    ssl_certificate_key /var/lib/xboxlive-protect/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    # Mozilla intermediate configuration — ECDHE preferred, DHE fallback.
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    # No HSTS — self-signed cert on a LAN appliance; HSTS would be hostile.

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";          # clear hop-by-hop for keepalive
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSE-ready block for /api/v1/peers/stream (Stage 3 — not yet built).
    # Uncomment this location when that endpoint exists; proxy_buffering off
    # is required for server-sent events to flush immediately to the client.
    # location /api/v1/peers/stream {
    #     proxy_pass         http://127.0.0.1:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Connection "";
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    #     proxy_buffering    off;
    #     proxy_read_timeout 1d;
    # }
}
