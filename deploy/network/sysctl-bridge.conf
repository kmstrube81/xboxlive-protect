# xboxlive-protect bridge netfilter sysctls.
# Installed to /etc/sysctl.d/99-xblp-bridge.conf by bring-up-bridge.sh.
#
# br_netfilter must be loaded before these take effect; bring-up-bridge.sh
# runs modprobe br_netfilter before writing this file and before applying
# these values with sysctl -w.
#
# bridge-nf-call-iptables=1: pass bridged IPv4 frames through the netfilter
# FORWARD hook so the nftables inet xblp forward chain can filter them.
#
# bridge-nf-call-ip6tables=0: xboxlive-protect is IPv4-only (DESIGN.md §1.2).
net.bridge.bridge-nf-call-iptables=1
net.bridge.bridge-nf-call-ip6tables=0
