# xboxlive-protect bridge interface configuration
# Installed to /etc/network/interfaces.d/br0.conf by bring-up-bridge.sh.
#
# __WAN_IFACE__ (router/network side), __LAN_IFACE__ (Xbox-facing side), and
# __WAN_MAC__ (WAN slave's hardware MAC) are substituted by bring-up-bridge.sh.
# Do not copy this file manually.
#
# Neither physical port has an IP address. br0 acquires a DHCP lease that
# serves as the device management address (xboxlive-protect.local).
#
# br0's hwaddress is pinned to the WAN slave's MAC so the appliance presents
# the same Layer 2 identity to the network as it did before bridge bring-up.
# This prevents mDNS host-name conflicts ("xboxlive-protect-2.local") caused
# by stale router/mDNS caches seeing two MACs claim the same hostname, and
# preserves any DHCP reservation made against the WAN slave's MAC.

auto __WAN_IFACE__
iface __WAN_IFACE__ inet manual
    pre-up ip link set $IFACE up

auto __LAN_IFACE__
iface __LAN_IFACE__ inet manual
    pre-up ip link set $IFACE up

auto br0
iface br0 inet dhcp
    bridge_ports __WAN_IFACE__ __LAN_IFACE__
    bridge_stp off
    bridge_fd 0
    bridge_maxwait 0
    hwaddress ether __WAN_MAC__
    post-up ip addr flush dev __WAN_IFACE__ 2>/dev/null || true
    post-up ip addr flush dev __LAN_IFACE__ 2>/dev/null || true
