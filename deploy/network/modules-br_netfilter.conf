# xboxlive-protect: load br_netfilter at boot so nftables can filter bridged traffic.
# Installed to /etc/modules-load.d/xblp-bridge.conf by bring-up-bridge.sh.
#
# Without this module the nftables inet/forward hook does not see Ethernet frames
# forwarded through br0; the blocklist would silently have no effect on Xbox traffic.
br_netfilter
